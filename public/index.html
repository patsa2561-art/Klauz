<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Klauz — does your edit change the meaning?</title>
<meta name="description" content="Klauz tracks meaning, not characters — catches contract edits that flip obligations, and tells you who they favor." />
<meta name="theme-color" content="#b8451f" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23b8451f'/%3E%3Ctext x='32' y='46' text-anchor='middle' font-size='40' fill='white'%3E%E2%9A%96%3C/text%3E%3C/svg%3E" />
<style>
  /* ============ design tokens (Klauz: Pinterest-warm, light) ============ */
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --surface-2: #f5f3ef;
    --surface-3: #ebe7e1;
    --border: #ebe5dc;
    --border-strong: #d8d1c4;
    --text: #1c1815;
    --text-2: #5f574e;
    --text-3: #a39a8d;
    --accent: #b8451f;             /* terracotta — signature */
    --accent-hover: #963a1b;
    --accent-soft: #fbf0e8;
    --accent-ring: rgba(184, 69, 31, .18);
    --ok: #2f7d4c;     --ok-soft: #ecf6ee;
    --warn: #a16207;   --warn-soft: #fdf6e3;
    --danger: #a8351b; --danger-soft: #fbeee8;
    --info: #2d6e7e;   --info-soft: #e8f1f3;
    --purple: #6d4cc8; --purple-soft: #f0eafa;
    --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-pill: 999px;
    --shadow-sm: 0 1px 2px rgb(28 24 21 / .04);
    --shadow-md: 0 1px 2px rgb(28 24 21 / .04), 0 8px 24px rgb(28 24 21 / .06);
    --shadow-lg: 0 12px 40px rgb(28 24 21 / .08);
    --serif: 'Iowan Old Style', 'Hoefler Text', Georgia, 'Charter', 'Noto Serif Thai', 'Sarabun', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Noto Sans Thai', 'IBM Plex Sans Thai', system-ui, sans-serif;
    --mono: ui-monospace, 'JetBrains Mono', 'SF Mono', 'Cascadia Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body {
    margin: 0;
    color: var(--text);
    font: 15px/1.55 var(--sans);
    letter-spacing: -.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* subtle warm paper feel — almost imperceptible, adds "real" weight */
    background:
      radial-gradient(ellipse 1200px 600px at 50% -200px, color-mix(in srgb, var(--accent) 4%, transparent) 0%, transparent 70%),
      radial-gradient(ellipse 800px 400px at 90% 30%, color-mix(in srgb, var(--accent) 3%, transparent) 0%, transparent 60%),
      var(--bg);
    background-attachment: fixed;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  img, svg { max-width: 100%; }
  .shell { max-width: 1080px; margin: 0 auto; padding: 0 32px; }

  /* header */
  header {
    padding: 22px 32px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .brand { display: flex; align-items: center; gap: 14px; color: var(--text); text-decoration: none; }
  .brand-mark {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    display: grid; place-items: center;
    color: white; font-size: 20px;
    box-shadow: 0 6px 18px rgb(184 69 31 / .22);
  }
  .brand-name { font-family: var(--serif); font-size: 23px; font-weight: 600; letter-spacing: -.018em; line-height: 1; }
  .brand-tagline { font-size: 11.5px; color: var(--ok); margin-top: 5px; font-weight: 500; }
  .langtog {
    display: flex; border: 1px solid var(--border); border-radius: var(--r-pill); overflow: hidden; background: var(--surface);
  }
  .langtog button {
    background: transparent; color: var(--text-2);
    padding: 7px 18px; font: 600 12.5px var(--sans); letter-spacing: .02em;
    border: 0; border-radius: 0; cursor: pointer; box-shadow: none;
  }
  .langtog button.active { background: var(--text); color: var(--surface); }
  .langtog button:hover { transform: none; }

  /* hero */
  .hero { padding: 80px 0 32px; text-align: center; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font: 600 11.5px var(--sans);
    text-transform: uppercase;
    letter-spacing: .15em;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
    border-radius: var(--r-pill);
    padding: 6px 14px;
    margin-bottom: 22px;
  }
  .hero-eyebrow::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .hero-title {
    font-family: var(--serif);
    font-size: clamp(34px, 5.4vw, 58px);
    font-weight: 600;
    letter-spacing: -.028em;
    line-height: 1.04;
    margin: 0 auto 18px;
    max-width: 880px;
  }
  .hero-title em { color: var(--accent); font-style: italic; font-weight: 600; }
  .hero-sub {
    font-size: 18px; color: var(--text-2);
    max-width: 640px; line-height: 1.6;
    margin: 0 auto;
  }

  /* credibility strip — small trust signals under hero */
  .creds {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    max-width: 940px;
    margin: 40px auto 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .cred {
    padding: 18px 14px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .cred:last-child { border-right: 0; }
  .cred-num {
    display: block;
    font-family: var(--serif);
    font-size: 22px; font-weight: 600;
    color: var(--accent);
    letter-spacing: -.01em;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .cred-lbl {
    display: block;
    font-size: 11.5px;
    color: var(--text-2);
    line-height: 1.4;
  }

  /* capability pill */
  #capbar { margin: 26px 0 8px; }
  .cap-pill {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px 8px 12px;
    border-radius: var(--r-pill);
    font-size: 13px;
    border: 1px solid var(--border);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
    max-width: 100%;
    line-height: 1.4;
  }
  .cap-pill code { background: var(--surface-2); padding: 1px 6px; border-radius: 4px; font: 12px var(--mono); }
  .cap-pill.smart { background: var(--ok-soft); border-color: color-mix(in srgb, var(--ok) 22%, var(--border)); color: var(--ok); }
  .cap-pill.deterministic { background: var(--warn-soft); border-color: color-mix(in srgb, var(--warn) 25%, var(--border)); color: var(--warn); }
  .cap-pill a { color: inherit; text-decoration: underline; }
  .cap-dot {
    width: 8px; height: 8px; border-radius: 50%; background: currentColor;
    box-shadow: 0 0 0 4px color-mix(in srgb, currentColor 18%, transparent);
    flex-shrink: 0;
  }

  /* drop panes — with a small arrow divider between them on desktop */
  .panes {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    margin: 24px 0;
    position: relative;
  }
  .panes::after {
    content: '→';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: grid; place-items: center;
    font: 700 16px var(--sans);
    color: var(--accent);
    box-shadow: var(--shadow-sm);
    pointer-events: none;
    z-index: 2;
  }
  .drop {
    background: var(--surface);
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--r-md);
    padding: 20px 22px 18px;
    display: flex; flex-direction: column;
    min-height: 260px;
    transition: border-color .15s, background .15s, transform .12s;
  }
  .drop:hover { border-color: var(--accent); }
  .drop.over { border-style: solid; border-color: var(--accent); background: var(--accent-soft); transform: scale(1.003); }
  .drop-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 14px;
  }
  .drop-label {
    font-size: 11px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .09em; font-weight: 700;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .drop-label::before {
    content: ''; width: 18px; height: 18px; border-radius: 4px;
    background: var(--accent-soft);
    border: 1px solid color-mix(in srgb, var(--accent) 25%, var(--border));
    display: inline-block;
    background-image: linear-gradient(135deg, transparent 50%, color-mix(in srgb, var(--accent) 18%, transparent) 50%);
  }
  .drop .pick { color: var(--accent); cursor: pointer; font-size: 13px; font-weight: 500; }
  .drop .pick:hover { text-decoration: underline; }
  textarea {
    flex: 1; width: 100%;
    background: transparent; color: var(--text);
    border: 0; padding: 0;
    font: 13px/1.55 var(--mono);
    resize: none; outline: none;
  }
  textarea::placeholder { color: var(--text-3); }

  /* controls */
  .controls {
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    padding: 16px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    margin-bottom: 18px;
  }
  .ctrl-label {
    font-size: 13px; color: var(--text-2); font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
  }
  input[type=text] {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: var(--r-sm);
    padding: 9px 14px; font: 14px var(--sans);
    outline: none; transition: border-color .12s, box-shadow .12s;
    min-width: 190px;
  }
  input[type=text]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
  .ctrl-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-left: auto; }

  /* buttons */
  button {
    background: var(--text); color: var(--surface);
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    padding: 10px 18px;
    font: 600 13.5px var(--sans);
    letter-spacing: -.005em;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s, background .12s, color .12s;
  }
  button:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  button:active { transform: translateY(0); box-shadow: none; }
  button:disabled { opacity: .45; cursor: default; transform: none; box-shadow: none; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ok { background: var(--ok); color: white; }
  .btn-info { background: var(--info); color: white; }
  .btn-purple { background: var(--purple); color: white; }
  .btn-ghost { background: transparent; color: var(--text); border-color: var(--border-strong); }
  .btn-ghost:hover { background: var(--surface-2); }

  /* mode hint + banners */
  .mode-hint { color: var(--text-2); font-size: 13px; padding: 0 2px 12px; }
  #banner { margin: 12px 0; }
  #banner > div { padding: 12px 16px; border-radius: var(--r-sm); font-size: 14px; border: 1px solid; }
  .banner-ok { background: var(--ok-soft); border-color: color-mix(in srgb, var(--ok) 30%, var(--border)); color: var(--ok); }
  .banner-busy { background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 25%, var(--border)); color: var(--accent-hover); }
  .banner-err { background: var(--danger-soft); border-color: color-mix(in srgb, var(--danger) 30%, var(--border)); color: var(--danger); }

  /* output */
  #out { margin-top: 22px; }
  #out > * + * { margin-top: 12px; }

  .verdict {
    font-family: var(--serif);
    font-size: 22px; font-weight: 600;
    padding: 18px 22px; border-radius: var(--r-md);
    letter-spacing: -.02em; line-height: 1.2;
  }
  .v-high { background: var(--danger-soft); color: var(--danger); border: 1px solid color-mix(in srgb, var(--danger) 25%, var(--border)); }
  .v-mid  { background: var(--warn-soft);   color: var(--warn);   border: 1px solid color-mix(in srgb, var(--warn) 30%, var(--border)); }
  .v-ok   { background: var(--ok-soft);     color: var(--ok);     border: 1px solid color-mix(in srgb, var(--ok) 25%, var(--border)); }
  .v-pcr  { background: var(--purple-soft); color: var(--purple); border: 1px solid color-mix(in srgb, var(--purple) 25%, var(--border)); }

  .meter { margin: 18px 0; }
  .bar {
    height: 26px; border-radius: var(--r-pill);
    background: var(--surface-2); overflow: hidden;
    display: flex; border: 1px solid var(--border);
  }
  .bar > span {
    display: flex; align-items: center;
    padding: 0 14px;
    font: 600 12px var(--sans);
    white-space: nowrap; color: white;
  }

  .change {
    border: 1px solid var(--border);
    border-left: 3px solid var(--border-strong);
    padding: 14px 18px;
    background: var(--surface);
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
    box-shadow: var(--shadow-sm);
  }
  .change.high { border-left-color: var(--danger); }
  .change.medium { border-left-color: var(--warn); }
  .change.low { border-left-color: var(--text-3); }
  .change b { font-weight: 600; }
  .del { color: var(--danger); font: 13px var(--mono); padding: 4px 0; }
  .add { color: var(--ok);     font: 13px var(--mono); padding: 4px 0; }
  .ev  { color: var(--text-2); font-size: 13px; margin-top: 8px; line-height: 1.55; }

  .tag {
    font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: .06em;
    color: white; display: inline-block; vertical-align: middle;
  }
  .tag.high { background: var(--danger); }
  .tag.medium { background: var(--warn); }
  .tag.low { background: var(--text-3); }

  .muted { color: var(--text-2); font-size: 13px; }
  .priv { color: var(--ok); font-size: 12px; font-weight: 500; }
  code { background: var(--surface-2); padding: 1px 6px; border-radius: 4px; font: .9em var(--mono); word-break: break-word; color: var(--text); }

  .infobox {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 22px 26px;
    box-shadow: var(--shadow-sm);
  }

  .info { position: relative; cursor: help; color: var(--accent); font-weight: 700; display: inline-flex; align-items: center; }
  .info .tip {
    display: none; position: absolute; left: 0; top: 24px; z-index: 10;
    width: 320px;
    background: var(--text); color: var(--surface);
    border-radius: var(--r-sm); padding: 14px 16px;
    font: 400 13px/1.55 var(--sans);
    box-shadow: var(--shadow-lg);
  }
  .info:hover .tip, .info:focus .tip { display: block; }

  footer.foot {
    margin-top: 80px;
    border-top: 1px solid var(--border);
    background: linear-gradient(180deg, transparent, color-mix(in srgb, var(--accent) 4%, var(--surface-2)) 100%);
    padding: 56px 32px 40px;
    color: var(--text-2);
  }
  footer.foot a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border-strong); }
  footer.foot a:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .foot-grid {
    max-width: 1080px; margin: 0 auto;
    display: grid; grid-template-columns: 1.5fr 1fr 1fr;
    gap: 48px; padding-bottom: 36px;
  }
  .foot-col h4 {
    font: 700 11.5px var(--sans);
    text-transform: uppercase; letter-spacing: .09em;
    color: var(--text-3); margin: 0 0 12px;
  }
  .foot-col p {
    margin: 0 0 10px;
    font-size: 13.5px; color: var(--text-2); line-height: 1.6;
  }
  .foot-brand { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .foot-name { font: 600 22px/1 var(--serif); letter-spacing: -.015em; color: var(--text); }
  .foot-tagline { font-size: 12px; color: var(--text-3); margin-top: 4px; }
  .foot-blurb { font-size: 13.5px; color: var(--text-2); line-height: 1.6; margin: 0; max-width: 380px; }
  .foot-bottom {
    max-width: 1080px; margin: 0 auto;
    padding-top: 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap;
    font-size: 12.5px; color: var(--text-3);
  }
  .foot-bottom .right { font-family: var(--serif); }

  /* trust / privacy banner */
  .trust { margin: 28px 0 4px; }
  .trust-card {
    background: linear-gradient(135deg, var(--accent-soft) 0%, var(--surface) 100%);
    border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--border));
    border-radius: var(--r-lg);
    padding: 22px 26px;
    box-shadow: var(--shadow-sm);
  }
  .trust-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .trust-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent); color: white;
    display: grid; place-items: center; font-size: 18px;
    box-shadow: 0 4px 12px rgb(184 69 31 / .25);
    flex-shrink: 0;
  }
  .trust-title { font-family: var(--serif); font-size: 19px; font-weight: 600; margin: 0; letter-spacing: -.01em; }
  .trust-intro { color: var(--text-2); margin: 0 0 14px; font-size: 14.5px; line-height: 1.6; }
  .trust-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .trust-pill {
    background: var(--surface);
    border: 1px solid color-mix(in srgb, var(--accent) 20%, var(--border));
    border-radius: var(--r-pill);
    padding: 6px 14px;
    font-size: 12.5px; font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
  }

  /* --- TRIPWIRE (context-aware risk scanner) --- */
  .tripwire-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--border-strong);
    border-radius: var(--r-md);
    padding: 18px 22px;
    box-shadow: var(--shadow-sm);
    margin: 12px 0;
  }
  .tripwire-card.risk-high { border-left-color: var(--danger); }
  .tripwire-card.risk-medium { border-left-color: var(--warn); }
  .tripwire-card.risk-low { border-left-color: var(--text-3); }
  .tripwire-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .tripwire-label { font: 600 16px var(--serif); letter-spacing: -.01em; }
  .risk-badge {
    font: 700 10.5px var(--sans);
    padding: 4px 10px; border-radius: 4px;
    letter-spacing: .08em;
    color: white;
  }
  .risk-badge.risk-high { background: var(--danger); }
  .risk-badge.risk-medium { background: var(--warn); }
  .risk-badge.risk-low { background: var(--text-3); }
  .tripwire-snippet {
    margin: 0 0 12px;
    padding: 10px 14px;
    background: var(--surface-2);
    border-left: 3px solid var(--border-strong);
    font: 12.5px/1.55 var(--mono);
    color: var(--text-2);
    border-radius: 0 6px 6px 0;
    word-break: break-word;
  }
  .tripwire-why {
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .tripwire-personas-row {
    display: flex; align-items: center; gap: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
    flex-wrap: wrap;
  }
  .tripwire-personas-lbl {
    font-size: 10.5px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .08em; font-weight: 700;
    flex-shrink: 0;
  }
  .tripwire-personas { display: flex; gap: 6px; flex-wrap: wrap; }
  .tw-pers {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    padding: 3px 4px 3px 10px;
    font-size: 11px;
  }
  .tw-pers.tw-pers-active {
    background: var(--accent-soft);
    border-color: color-mix(in srgb, var(--accent) 30%, var(--border));
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 12%, transparent);
  }
  .tw-pers-name { color: var(--text-2); font-weight: 500; }
  .tw-pers.tw-pers-active .tw-pers-name { color: var(--accent); font-weight: 600; }
  .risk-pip {
    font: 700 9.5px var(--sans);
    padding: 2px 6px; border-radius: 3px;
    color: white;
    letter-spacing: .03em;
  }
  .risk-pip.risk-high { background: var(--danger); }
  .risk-pip.risk-medium { background: var(--warn); }
  .risk-pip.risk-low { background: var(--text-3); }
  /* dropdown for persona */
  select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    padding: 9px 32px 9px 14px;
    font: 14px var(--sans);
    outline: none; cursor: pointer;
    transition: border-color .12s, box-shadow .12s;
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-3) 50%), linear-gradient(135deg, var(--text-3) 50%, transparent 50%);

let LANG = localStorage.getItem('md_lang') || 'en';
function t(k) { return (I18N[LANG] && I18N[LANG][k]) ?? I18N.en[k] ?? k; }
function setLang(l) {
  LANG = l; localStorage.setItem('md_lang', l);
  document.documentElement.lang = l;
  document.querySelectorAll('[data-i18n]').forEach(el => el.innerHTML = t(el.dataset.i18n));
  document.getElementById('textA').placeholder = t('ph_before');
  document.getElementById('textB').placeholder = t('ph_after');
  document.getElementById('lang-en').classList.toggle('active', l === 'en');
  document.getElementById('lang-th').classList.toggle('active', l === 'th');
}

const TEXT_EXT = ['txt', 'md', 'text', 'csv'];
function wireDrop(dropId, fileId, textId) {
  const drop = document.getElementById(dropId), file = document.getElementById(fileId), ta = document.getElementById(textId);
  const load = async (f) => {
    const ext = (f.name.split('.').pop() || '').toLowerCase();
    if (TEXT_EXT.includes(ext)) { const r = new FileReader(); r.onload = () => ta.value = r.result; r.readAsText(f); return; }
    ta.value = `${t('reading')} ${f.name} …`;
    try {
      const buf = await f.arrayBuffer(); let bin = ''; const bytes = new Uint8Array(buf);
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      const res = await fetch('/extract', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filename: f.name, dataBase64: btoa(bin) }) });
      const j = await res.json();
      if (j.error) { ta.value = '✗ extract error: ' + j.error; return; }
      ta.value = j.text || '';
      banner(`${t('read_done')}: ${f.name} (${j.engine}${j.pages ? ', ' + j.pages + ' p' : ''}${j.sheets ? ', ' + j.sheets + ' sheets' : ''})`, 'ok');
    } catch (e) { ta.value = '✗ ' + e.message; }
  };
  file.addEventListener('change', () => file.files[0] && load(file.files[0]));
  drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('over'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('over'));
  drop.addEventListener('drop', (e) => { e.preventDefault(); drop.classList.remove('over'); e.dataTransfer.files[0] && load(e.dataTransfer.files[0]); });
}
wireDrop('dropA', 'fileA', 'textA'); wireDrop('dropB', 'fileB', 'textB');

async function run() {

  const dA = document.getElementById('dropA'), dB = document.getElementById('dropB');
  dA.style.borderColor = ''; dB.style.borderColor = '';
  if (!oldT || !newT) { if (!oldT) dA.style.borderColor = 'var(--danger)'; if (!newT) dB.style.borderColor = 'var(--danger)'; banner(t('need_both'), 'err'); return; }
  const go = document.getElementById('go'); go.disabled = true;
  banner(t('analyzing'), 'busy'); document.getElementById('out').innerHTML = '';

    const r = await fetch('/diff', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ old: oldT, new: newT, parties: document.getElementById('parties').value }) });

}

function renderLint(rep) {
  const s = rep.summary, out = document.getElementById('out');
  const vc = s.errors ? 'v-high' : s.warnings ? 'v-mid' : 'v-ok';
  let html = '<div class="verdict ' + vc + '">' + (s.clean ? t('lint_clean')
    : s.errors + ' ' + t('lint_errors') + ' · ' + s.warnings + ' ' + t('lint_warns')) + '</div>';
  if (s.template_like) html += '<div style="margin:10px 0;padding:10px 14px;border-radius:8px;background:var(--ok-soft);color:var(--ok);font-size:13px;border:1px solid color-mix(in srgb, var(--ok) 25%, var(--border))">' + esc(t('lint_template')) + '</div>';
  html += '<div class="muted" style="margin:8px 0">' + esc(t('lint_why')) + '</div>';
  for (const f of rep.findings) {
    const err = f.severity === 'error';
    const icon = err ? '<span style="color:var(--danger)">✗</span>' : '<span style="color:var(--warn)">⚠</span>';
    html += '<div class="change ' + (err ? 'high' : 'medium') + '">' + icon + ' <span class="muted">L' + f.line + '</span> ' + esc(LANG === 'th' ? f.th : f.en) + '</div>';
  }
  if (!rep.findings.length) html += '<div class="muted">' + t('lint_clean') + '</div>';
  out.innerHTML = html;
}

function renderTripwire(rep, persona) {
  const s = rep.summary, out = document.getElementById('out');
  const pLabel = t('persona_' + persona);
  if (s.total === 0) {
    out.innerHTML =
      '<div class="verdict v-ok">✅ ' + esc(t('tripwire_no_risk')) + ' <b>' + esc(pLabel) + '</b></div>' +
      '<div class="muted" style="margin:10px 0">' + esc(t('tripwire_clean_note')) + '</div>';
    return;
  }
  const vc = s.high ? 'v-high' : s.medium ? 'v-mid' : 'v-ok';
  let html = '<div class="verdict ' + vc + '">🚨 ' + s.total + ' ' + t('tripwire_found') + ' <b>' + esc(pLabel) + '</b>' +
    ' &nbsp;<span style="font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:.02em">' +
      s.high + ' <span style="color:var(--danger)">high</span> · ' +
      s.medium + ' <span style="color:var(--warn)">medium</span> · ' +
      s.low + ' <span style="color:var(--text-3)">low</span></span></div>';
  html += '<div class="muted" style="margin:10px 0 18px">' + t('tripwire_why_pa') + '</div>';
  for (const f of rep.findings) {
    const lbl = (LANG === 'th' && f.label.th) ? f.label.th : f.label.en;
    const why = (LANG === 'th' && f.why.th) ? f.why.th : f.why.en;
    html += '<div class="tripwire-card risk-' + f.risk + '">';
    html += '<div class="tripwire-head"><span class="risk-badge risk-' + f.risk + '">' + f.risk + '</span> <span class="tripwire-label">' + esc(lbl) + '</span></div>';
    html += '<div class="tripwire-snippet">' + esc(f.snippet) + '</div>';
    html += '<div class="tripwire-why">' + esc(why) + '</div>';
    html += '<div class="tripwire-personas-row"><span class="tripwire-personas-lbl">' + esc(t('cross_persona')) + '</span><div class="tripwire-personas">';
    for (const p of ['freelancer','sme','consumer','employee','enterprise']) {
      const rsk = f.all_risks[p] || 'low';
      html += '<div class="tw-pers' + (p === persona ? ' tw-pers-active' : '') + '"><span class="tw-pers-name">' + esc(t('persona_' + p)) + '</span><span class="risk-pip risk-' + rsk + '">' + rsk + '</span></div>';
    }
    html += '</div></div></div>';
  }
  out.innerHTML = html;
}
let LAST_CERT = null;
async function runCertify() {
  const oldT = document.getElementById('textA').value.trim(), newT = document.getElementById('textB').value.trim();
  const dA = document.getElementById('dropA'), dB = document.getElementById('dropB');
  dA.style.borderColor = ''; dB.style.borderColor = '';
  if (!oldT || !newT) { if (!oldT) dA.style.borderColor = 'var(--danger)'; if (!newT) dB.style.borderColor = 'var(--danger)'; banner(t('need_both'), 'err'); return; }
  const b = document.getElementById('certify'); b.disabled = true;
  banner(t('certifying'), 'busy'); document.getElementById('out').innerHTML = '';
  try {
    const r = await fetch('/certify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ old: oldT, new: newT, parties: document.getElementById('parties').value }) });
    const rep = await r.json();
    if (rep.error) { banner('error: ' + rep.error, 'err'); b.disabled = false; return; }
    LAST_CERT = rep.cert;
    renderCert(rep); banner(t('cert_done'), 'ok');
  } catch (e) { banner('error: ' + e.message, 'err'); }
  b.disabled = false;
}
function renderCert(rep) {
  const c = rep.cert, s = c.summary, out = document.getElementById('out');
  const cov = s.coverage_complete;
  let html = '<div class="verdict v-pcr">' + t('pcr_title') + '</div>';
  html += '<div class="muted" style="margin:10px 0">' + esc(t('pcr_why')) + '</div>';
  html += '<div class="meter"><b>' + t('pcr_coverage') + ':</b> ' + (cov
    ? '<span style="color:var(--ok)">✓ ' + t('pcr_complete') + '</span>'
    : '<span style="color:var(--danger)">✗ ' + t('pcr_incomplete') + '</span>')
    + ' &nbsp;·&nbsp; ' + s.clauses_before + '→' + s.clauses_after + ' ' + t('pcr_clauses') + '</div>';
  html += '<div class="muted" style="margin-bottom:8px"><b style="color:var(--ok)">' + s.deterministic_changes + '</b> ' + t('pcr_proven')
    + ' &nbsp;·&nbsp; <b style="color:var(--warn)">' + s.model_asserted + '</b> ' + t('pcr_model') + '</div>';
  if (rep.capability) html += '<div class="muted" style="margin-bottom:10px;font-size:12px">' + (rep.capability.llm
    ? '🧠 meaning tier by <b>tribunal</b> (proof + dual-judge consensus · judge ' + esc(rep.capability.judge) + ')'
    : '📏 deterministic only — no local AI; only provable changes are classified') + '</div>';
  for (const row of rep.rows) {
    const proven = row.proven;
    const icon = proven ? '<span style="color:var(--ok)">✓</span>' : '<span style="color:var(--warn)">?</span>';
    const cls = row.tier === 'ABSTAIN' ? 'medium' : row.tier === 'CONSENSUS' ? 'low' : proven ? 'low' : 'medium';
    const badge = row.tier ? tierChip(row.tier) : '';
    html += '<div class="change ' + cls + '">' + icon + ' ' + badge + ' ' + esc(LANG === 'th' ? row.th : row.en) + '</div>';
  }
  html += '<div class="ev" style="margin-top:14px;word-break:break-all;font-family:var(--mono);font-size:11.5px;background:var(--surface-2);padding:10px 12px;border-radius:8px">sig (' + c.alg + '): ' + esc(c.signature.slice(0, 44)) + '…<br>merkle: ' + esc(c.merkleRoot.slice(0, 44)) + '…</div>';
  html += '<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">'
    + '<button class="btn-purple" onclick="downloadCert()">' + t('pcr_dl') + '</button>'
    + '<button class="btn-ghost" onclick="recheckCert()">' + t('pcr_recheck') + '</button></div>';
  out.innerHTML = html;
}
function downloadCert() {
  if (!LAST_CERT) return;
  const blob = new Blob([JSON.stringify(LAST_CERT, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'redline-' + LAST_CERT.merkleRoot.slice(0, 8) + '.pcr'; a.click(); URL.revokeObjectURL(a.href);
}
async function recheckCert() {
  if (!LAST_CERT) return;
  const oldT = document.getElementById('textA').value.trim(), newT = document.getElementById('textB').value.trim();
  banner('⏳…', 'busy');
  try {
    const r = await fetch('/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cert: LAST_CERT, old: oldT, new: newT }) });
    const res = await r.json();
    const msg = res.status === 'VALID' ? t('v_valid') : res.status === 'PARTIAL' ? t('v_partial') : t('v_tampered');
    banner((res.status === 'TAMPERED' ? '✗ ' : '✓ ') + msg, res.status === 'TAMPERED' ? 'err' : 'ok');
  } catch (e) { banner('error: ' + e.message, 'err'); }
}
function balanceBar(bal, labelKey) {
  if (!bal || !bal.byParty.length) return '';
  const cols = ['var(--accent)', 'var(--info)', 'var(--warn)', 'var(--ok)'];
  let h = '<div class="meter"><div class="muted" style="margin-bottom:8px">' + t(labelKey) + ' <b style="color:var(--text)">' + esc(bal.tilt) + '</b>' + (bal.oneSided ? ' <span style="color:var(--danger)">' + t('onesided') + '</span>' : '') + '</div><div class="bar">';
  bal.byParty.forEach((p, i) => { h += '<span style="width:' + p.percent + '%;background:' + cols[i % 4] + '">' + esc(p.party) + ' ' + p.percent + '%</span>'; });
  return h + '</div></div>';
}
function renderAudit(rep) {
  const s = rep.summary, out = document.getElementById('out');
  const vc = s.high ? 'v-high' : s.material ? 'v-mid' : 'v-ok';
  let html = '<div class="verdict ' + vc + '">' + esc(s.verdict || (s.material + ' ' + t('material') + ' · ' + s.high + ' ' + t('high') + ' ' + t('of') + ' ' + s.clauses + ' ' + t('clauses'))) + '</div>';
  html += balanceBar(s.balance, 'tilt_to');
  for (const f of rep.findings) {
    const sev = f.severity || 'low';
    html += '<div class="change ' + sev + '"><span class="tag ' + sev + '">' + sev + '</span> <b>' + esc(f.category) + '</b>' + (f.favors && f.favors !== 'neutral' ? ' <span class="muted">(' + t('favors') + ' ' + esc(f.favors) + ')</span>' : '') + '<div style="margin-top:6px">' + esc(LANG === 'th' ? f.clause_th || f.clause : f.clause) + '</div>';
    if (f.why) html += '<div class="ev">↳ ' + esc(LANG === 'th' ? f.why_th || f.why : f.why) + '</div>';
    html += '</div>';
  }
  if (!rep.findings.length) html += '<div class="muted">' + t('no_material') + '</div>';
  out.innerHTML = html;
}
function render(rep) {
  const s = rep.summary, out = document.getElementById('out');
  const vc = s.highRisk ? 'v-high' : s.meaningChanges ? 'v-mid' : 'v-ok';
  let html = '<div class="verdict ' + vc + '">' + esc(s.verdict) + ' &nbsp;·&nbsp; ' + s.meaningChanges + ' ' + t('mchanges') + ' · ' + s.highRisk + ' ' + t('high') + ' · ' + s.semanticChangeIndex + '/100</div>';
  html += balanceBar(s.powerShift, 'powershift');
  for (const c of rep.changes) {
    const sev = c.severity || 'low';
    html += '<div class="change ' + sev + '"><span class="tag ' + sev + '">' + sev + '</span> <b>' + esc(c.type) + '</b> <span class="muted">(' + esc(c.category) + (c.favors && c.favors !== 'neutral' ? ' · ' + t('favors') + ' ' + esc(c.favors) : '') + ')</span>';
    if (c.old) html += '<div class="del">− ' + esc(c.old) + '</div>';
    if (c.new) html += '<div class="add">+ ' + esc(c.new) + '</div>';
    if (c.evidence && c.type !== 'ADDED' && c.type !== 'REMOVED') html += '<div class="ev">↳ ' + esc(c.evidence) + ' — ' + esc(c.explanation) + '</div>';
    html += '</div>';
  }
  if (!rep.changes.length) html += '<div class="muted">' + t('no_changes') + '</div>';
  out.innerHTML = html;
}
function banner(msg, kind) {
  const b = document.getElementById('banner');
  const cls = kind === 'err' ? 'banner-err' : kind === 'busy' ? 'banner-busy' : 'banner-ok';
  b.innerHTML = '<div class="' + cls + '">' + msg + '</div>';
}
function esc(s) { return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
function tierChip(tier) {
  const m = {
    PROVEN:    { bg: 'var(--ok-soft)',     fg: 'var(--ok)',     bd: 'color-mix(in srgb, var(--ok) 30%, var(--border))' },
    CONSENSUS: { bg: 'var(--info-soft)',   fg: 'var(--info)',   bd: 'color-mix(in srgb, var(--info) 30%, var(--border))' },
    ABSTAIN:   { bg: 'var(--warn-soft)',   fg: 'var(--warn)',   bd: 'color-mix(in srgb, var(--warn) 30%, var(--border))' },
  };
  const c = m[tier] || { bg: 'var(--surface-2)', fg: 'var(--text-2)', bd: 'var(--border)' };
  return '<span class="tier-chip" style="background:' + c.bg + ';color:' + c.fg + ';border:1px solid ' + c.bd + '">' + tier + '</span>';
}
async function loadCapabilities() {
  try {
    const c = await (await fetch('/capabilities')).json();
    const bar = document.getElementById('capbar'); if (!bar) return;
    if (c.llm) {
      bar.innerHTML = '<div class="cap-pill smart"><span class="cap-dot"></span>'
        + '<span><b>smart mode</b> — auto-detected local AI: <code>' + esc(c.judge) + '</code> · free · on this machine</span></div>';
    } else {
      bar.innerHTML = '<div class="cap-pill deterministic"><span class="cap-dot"></span>'
        + '<span><b>deterministic mode</b> — no local AI; Certify / Lint / Merge / Scan + provable changes work now. '
        + 'For deeper meaning: install <a href="https://ollama.com" target="_blank" rel="noopener">Ollama</a> → <code>ollama pull gemma3:12b</code></span></div>';
    }
  } catch (e) {}
}
setLang(LANG);                 // apply i18n on load
loadCapabilities();            // auto-detect local AI banner
</script>
