<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Klauz — does your edit really change the meaning?">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf8f5"/>
      <stop offset="100%" stop-color="#f7ede2"/>
    </linearGradient>
    <radialGradient id="warm" cx="85%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#b8451f" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#b8451f" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#b8451f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8451f"/>
      <stop offset="100%" stop-color="#963a1b"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="480" fill="url(#bg)"/>
  <rect width="1280" height="480" fill="url(#warm)"/>

  <!-- top hairline -->
  <line x1="80" y1="80" x2="1200" y2="80" stroke="#d8d1c4" stroke-width="1"/>

  <!-- brand row -->
  <g transform="translate(80, 105)">
    <rect width="56" height="56" rx="14" fill="url(#mark)"/>
    <text x="28" y="40" text-anchor="middle" font-size="30" fill="#fff" font-family="'Apple Color Emoji','Segoe UI Emoji',serif">⚖</text>
  </g>
  <text x="152" y="128" font-family="Georgia,'Iowan Old Style',serif" font-size="32" font-weight="600" fill="#1c1815" letter-spacing="-0.5">Klauz</text>
  <text x="152" y="148" font-family="Georgia,serif" font-size="13" font-style="italic" fill="#a39a8d">/klaʊz/ — say it: <tspan font-weight="600" fill="#5f574e">"klowz"</tspan> (rhymes with rows)</text>
  <text x="152" y="170" font-family="-apple-system,Inter,'Segoe UI',sans-serif" font-size="11.5" fill="#b8451f" letter-spacing="3" font-weight="700">CONTRACT REDLINE INTELLIGENCE</text>

  <!-- hero title -->
  <text x="80" y="262" font-family="Georgia,'Iowan Old Style',serif" font-size="68" font-weight="600" fill="#1c1815" letter-spacing="-1.5">Does your edit really</text>
  <text x="80" y="332" font-family="Georgia,'Iowan Old Style',serif" font-size="68" font-weight="600" fill="#1c1815" letter-spacing="-1.5">change the <tspan font-style="italic" fill="#b8451f">meaning</tspan>?</text>

  <!-- subtitle -->
  <text x="80" y="380" font-family="-apple-system,Inter,'Segoe UI',sans-serif" font-size="19" fill="#5f574e">Catch contract edits that look innocent but flip obligations —</text>
  <text x="80" y="405" font-family="-apple-system,Inter,'Segoe UI',sans-serif" font-size="19" fill="#5f574e">and tell you <tspan font-weight="600" fill="#1c1815">who they favor</tspan>.</text>

  <!-- URL pill -->
  <g transform="translate(80, 432)">
    <rect width="190" height="34" rx="17" fill="#1c1815"/>
    <text x="95" y="22" text-anchor="middle" font-family="-apple-system,Inter,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#fafaf9">🌐 klauz.space</text>
  </g>
  <text x="282" y="453" font-family="-apple-system,Inter,sans-serif" font-size="12" fill="#a39a8d">live demo · MIT licensed · github.com/patsa2561-art/Klauz</text>

  <!-- right-side credibility -->
  <g font-family="-apple-system,Inter,'Segoe UI',sans-serif">
    <g transform="translate(870, 195)">
      <rect width="320" height="180" rx="14" fill="#fff" stroke="#ebe5dc"/>
      <line x1="0" y1="90" x2="320" y2="90" stroke="#ebe5dc"/>
      <line x1="160" y1="0" x2="160" y2="180" stroke="#ebe5dc"/>

      <g text-anchor="middle">
        <text x="80" y="40" font-family="Georgia,serif" font-size="26" font-weight="600" fill="#b8451f">100%</text>
        <text x="80" y="65" font-size="11" fill="#5f574e">recall · modal/neg/number</text>

        <text x="240" y="40" font-family="Georgia,serif" font-size="26" font-weight="600" fill="#b8451f">⚖</text>
        <text x="240" y="65" font-size="11" fill="#5f574e">signed receipts</text>

        <text x="80" y="130" font-family="Georgia,serif" font-size="22" font-weight="600" fill="#b8451f">EN · TH</text>
        <text x="80" y="155" font-size="11" fill="#5f574e">bilingual detectors</text>

        <text x="240" y="130" font-family="Georgia,serif" font-size="22" font-weight="600" fill="#b8451f">MIT</text>
        <text x="240" y="155" font-size="11" fill="#5f574e">open source</text>
      </g>
    </g>
  </g>
</svg>
